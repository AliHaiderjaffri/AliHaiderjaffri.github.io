<div class="player">

id="mainPlayer"

allowfullscreen>

</iframe>

<div id="videos">

<div class="loading">

Loading Videos...

</div>

</div>
<script>

const API_KEY="AIzaSyDA79s4F4WlSdSQIhvHrWKw7TOEzpP0K54";

const PLAYLIST_ID="PLQ4-wKg7sUzM";

async function loadVideos(){

const container=document.getElementById("videos");

try{

const response=await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=20&playlistId=${PLAYLIST_ID}&key=${API_KEY}`);

const data=await response.json();

container.innerHTML="";

data.items.forEach((item,index)=>{

const title=item.snippet.title;

const thumb=item.snippet.thumbnails.high.url;

const videoId=item.snippet.resourceId.videoId;

if(index===0){

document.getElementById("mainPlayer").src=`https://www.youtube.com/embed/${videoId}`;

}

container.innerHTML+=`

<div class="card">

<img src="${thumb}" class="thumb">

<h3>${title}</h3>

<button onclick="playVideo('${videoId}')">

▶ Watch Now

</button>

</div>

`;

});

}catch(e){

container.innerHTML="<div class='loading'>Unable to load videos.</div>";

}

}

function playVideo(id){

document.getElementById("mainPlayer").src=`https://www.youtube.com/embed/${id}?autoplay=1`;

window.scrollTo({

top:0,

behavior:"smooth"

});

}

loadVideos();

</script>
