<script>

const API_KEY = "AIzaSyDA79s4F4WlSdSQIhvHrWKw7TOEzpP0K54";

const PLAYLIST_ID = "PLQ4-wKg7sUzM";

const MAX_RESULTS = 20;

async function loadVideos(){

const container=document.getElementById("videos");

container.innerHTML="<div class='loading'>Loading Videos...</div>";

try{

const response=await fetch(

`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=${MAX_RESULTS}&playlistId=${PLAYLIST_ID}&key=${API_KEY}`

);

const data=await response.json();

container.innerHTML="";

if(!data.items || data.items.length===0){

container.innerHTML="<div class='loading'>No videos found.</div>";

return;

}

data.items.forEach(video=>{

const title=video.snippet.title;

const thumbnail=video.snippet.thumbnails.high.url;

const videoId=video.snippet.resourceId.videoId;

container.innerHTML+=`

<div class="video-card">

<img src="${thumbnail}" alt="${title}">

<h3>${title}</h3>

<a
class="watch"
href="#"
onclick="playVideo('${videoId}');return false;">

▶ Watch Video

</a>

</div>

`;

});

}catch(error){

container.innerHTML="<div class='loading'>Failed to load videos.</div>";

console.log(error);

}

}

loadVideos();

</script>

<script>

const modal=document.getElementById("videoModal");

const player=document.getElementById("player");

const closeBtn=document.getElementById("closeVideo");

function playVideo(videoId){

player.src="https://www.youtube.com/embed/"+videoId+"?autoplay=1";

modal.style.display="flex";

document.body.style.overflow="hidden";

}

closeBtn.onclick=function(){

modal.style.display="none";

player.src="";

document.body.style.overflow="auto";

};

window.onclick=function(e){

if(e.target===modal){

modal.style.display="none";

player.src="";

document.body.style.overflow="auto";

}

};

</script>
