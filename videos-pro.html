<script>

const API_KEY="AIzaSyDA79s4F4WlSdSQIhvHrWKw7TOEzpP0K54";

const PLAYLIST_ID="PLQ4-wKg7sUzM";

let player;

function onYouTubeIframeAPIReady(){

player=new YT.Player("player",{

height:"620",

width:"100%",

playerVars:{

listType:"playlist",

list:PLAYLIST_ID,

rel:0,

modestbranding:1

}

});

loadPlaylist();

}

async function loadPlaylist(){

const response=await fetch(

`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${PLAYLIST_ID}&maxResults=25&key=${API_KEY}`

);

const data=await response.json();

const playlist=document.getElementById("playlist");

playlist.innerHTML="";

data.items.forEach((item,index)=>{

const videoId=item.snippet.resourceId.videoId;

const title=item.snippet.title;

const thumb=item.snippet.thumbnails.high.url;

playlist.innerHTML+=`

<div class="card" onclick="playVideo(${index})">

<img src="${thumb}">

<h3>${title}</h3>

</div>

`;

});

}

function playVideo(index){

player.playVideoAt(index);

window.scrollTo({

top:0,

behavior:"smooth"

});

}

</script>
